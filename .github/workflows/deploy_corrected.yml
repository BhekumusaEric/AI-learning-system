name: Corrected AWS EC2 Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js project
        run: npm run build
        env:
          # Add any required build-time environment variables here
          NODE_ENV: production

      - name: Set up SSH Private Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2 via Rsync
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          
          # Deploy the Next.js standalone output
          # The app uses output: 'standalone' in next.config.ts which is required for Node deployments without Next.js source
          rsync -avz --delete .next/standalone/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/AI-learning-system/
          
          # Deploy static assets (required for standalone mode to serve static files correctly)
          rsync -avz --delete public/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/AI-learning-system/public/
          rsync -avz --delete .next/static/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/AI-learning-system/.next/static/

      - name: Restart PM2 Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/AI-learning-system
            
            # Note: Production environment variables (DATABASE_URL, NEXTAUTH_SECRET, RESEND_API_KEY) 
            # should be configured directly on the EC2 instance inside a .env file or PM2 config.
            
            # Start or restart the Next.js standalone server
            if pm2 list | grep -q "saaio-grounds"; then
                pm2 restart saaio-grounds
            else
                pm2 start server.js --name "saaio-grounds" --env production
            fi
            
            pm2 save
