$kind: http-request
name: Get WRP Progress
method: GET
url: '{{baseUrl}}/api/wrp/progress'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
tests: |-
  pm.test("Status is 200 or 401", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 401, 403, 404]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });