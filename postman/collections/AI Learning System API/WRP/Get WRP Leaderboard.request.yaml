$kind: http-request
name: Get WRP Leaderboard
method: GET
url: '{{baseUrl}}/api/wrp/leaderboard'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
queryParams:
  - key: cohortId
    value: '{{cohortId}}'
  - key: platform
    value: '{{platform}}'
tests: |-
  pm.test("Status is 200", function () {
    pm.response.to.have.status(200);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });
  pm.test("Leaderboard is array or has entries", function () {
    const json = pm.response.json();
    const isArray = Array.isArray(json);
    const hasData = typeof json === "object" && (json.leaderboard || json.entries || json.data);
    pm.expect(isArray || hasData).to.be.true;
  });