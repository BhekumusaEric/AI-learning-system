$kind: http-request
name: Get Supervisor Profile
method: GET
url: '{{baseUrl}}/api/supervisor/profile'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
tests: |-
  pm.test("Status is 200 or 401", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 401, 403]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });
  if (pm.response.code === 200) {
    pm.test("Profile has id", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.any.keys("id", "_id", "login_id", "supervisor_id");
    });
  }