$kind: http-request
name: Generate Invite Link
method: POST
url: '{{baseUrl}}/api/supervisor/invite'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "cohortId": "{{cohortId}}",
      "platform": "{{platform}}",
      "expiresIn": 7
    }
tests: |-
  pm.test("Status is 200 or 201", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 401]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });
  if (pm.response.code === 200 || pm.response.code === 201) {
    pm.test("Invite link has code or url", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.any.keys("code", "url", "invite_code", "link");
    });
    const json = pm.response.json();
    pm.collectionVariables.set("inviteCode", json.code || json.invite_code || "");
  }