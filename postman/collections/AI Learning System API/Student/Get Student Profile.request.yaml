$kind: http-request
name: Get Student Profile
method: GET
url: '{{baseUrl}}/api/student/profile'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
tests: |-
  pm.test("Status is 200 or 401", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 401, 403, 404]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });
  if (pm.response.code === 200) {
    pm.test("Student profile has login_id or id", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.any.keys("login_id", "id", "_id", "username");
    });
  }