$kind: http-request
name: Register Student
method: POST
url: '{{baseUrl}}/api/registration/register'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "inviteCode": "{{inviteCode}}",
      "studentId": "WTC2024001",
      "firstName": "John",
      "lastName": "Doe",
      "email": "john.doe@student.wethinkcode.co.za",
      "phone": "+27123456789",
      "platform": "{{platform}}"
    }
tests: |-
  pm.test("Status is 200 or 201", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 201, 400]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });
  if (pm.response.code === 200 || pm.response.code === 201) {
    pm.test("Registration returns credentials", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.any.keys("login_id", "password", "username", "credentials");
    });
  }