$kind: http-request
name: List Learning Grounds
method: GET
url: '{{baseUrl}}/api/content/grounds'
order: 1000
tests: |-
  pm.test("Status is 200", function () {
    pm.response.to.have.status(200);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });
  pm.test("Response is an array or has grounds property", function () {
    const json = pm.response.json();
    const isArray = Array.isArray(json);
    const hasGrounds = typeof json === "object" && (json.grounds || json.data);
    pm.expect(isArray || hasGrounds).to.be.true;
  });
  const json = pm.response.json();
  const grounds = Array.isArray(json) ? json : (json.grounds || json.data || []);
  if (grounds.length > 0) {
    pm.collectionVariables.set("groundId", grounds[0].id || grounds[0]._id || "");
  }