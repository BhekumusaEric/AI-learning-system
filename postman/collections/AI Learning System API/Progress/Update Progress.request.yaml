$kind: http-request
name: Update Progress
method: POST
url: '{{baseUrl}}/api/progress'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "contentId": "{{contentId}}",
      "status": "completed",
      "score": 100
    }
tests: |-
  pm.test("Status is 200 or 201", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 201, 400]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });