$kind: http-request
name: Delete Cohort
method: DELETE
url: '{{baseUrl}}/api/admin/cohorts/{{cohortId}}'
order: 10000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
tests: |-
  pm.test("Status is 200 or 204", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 204, 401, 404]);
  });