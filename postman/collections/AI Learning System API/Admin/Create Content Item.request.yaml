$kind: http-request
name: Create Content Item
method: POST
url: '{{baseUrl}}/api/admin/content'
order: 21000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "groundId": "{{groundId}}",
      "title": "Introduction to Programming",
      "description": "Learn the basics of programming",
      "type": "video",
      "url": "https://example.com/content/intro",
      "duration": 30,
      "order": 1
    }
tests: |-
  pm.test("Status is 200 or 201", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 401]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });
  if (pm.response.code === 200 || pm.response.code === 201) {
    pm.test("Created content item has id", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.any.keys("id", "_id", "content_id");
    });
    const json = pm.response.json();
    pm.collectionVariables.set("contentId", json.id || json._id || json.content_id || "");
  }