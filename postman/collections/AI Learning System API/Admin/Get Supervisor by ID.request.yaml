$kind: http-request
name: Get Supervisor by ID
method: GET
url: '{{baseUrl}}/api/admin/supervisors/{{supervisorId}}'
order: 13000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
tests: |-
  pm.test("Status is 200 or 404", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 404, 401]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });