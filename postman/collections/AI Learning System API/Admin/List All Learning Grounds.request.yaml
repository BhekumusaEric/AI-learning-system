$kind: http-request
name: List All Learning Grounds (Admin)
method: GET
url: '{{baseUrl}}/api/admin/grounds'
order: 16000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
tests: |-
  pm.test("Status is 200 or 401", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 401, 403]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });