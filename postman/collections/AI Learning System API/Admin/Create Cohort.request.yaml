$kind: http-request
name: Create Cohort
method: POST
url: '{{baseUrl}}/api/admin/cohorts'
order: 7000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Cohort 2024",
      "platform": "{{platform}}",
      "startDate": "2024-01-01",
      "endDate": "2024-12-31"
    }
tests: |-
  pm.test("Status is 200 or 201", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 401]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });
  if (pm.response.code === 200 || pm.response.code === 201) {
    pm.test("Created cohort has id", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.any.keys("id", "_id", "cohort_id");
    });
    const json = pm.response.json();
    pm.collectionVariables.set("cohortId", json.id || json._id || json.cohort_id || "");
  }