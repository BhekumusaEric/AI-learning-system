$kind: http-request
name: Update Student
method: PUT
url: '{{baseUrl}}/api/admin/students/{{loginId}}'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "student@example.com",
      "cohortId": "{{cohortId}}"
    }
tests: |-
  pm.test("Status is 200 or 400", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 400, 401, 404]);
  });
  pm.test("Response is JSON", function () {
    pm.response.to.be.json;
  });