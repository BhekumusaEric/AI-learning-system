$kind: http-request
name: Delete Learning Ground
method: DELETE
url: '{{baseUrl}}/api/admin/grounds/{{groundId}}'
order: 20000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
tests: |-
  pm.test("Status is 200 or 204", function () {
    pm.expect(pm.response.code).to.be.oneOf([200, 204, 401, 404]);
  });